<!DOCTYPE html>
<html lang = "en">

<head>
  <meta charset = "UTF-8">
  <title>Events Cal0endar</title>
  <link rel = "stylesheet" href = "css/events.css">
</head>

<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="craftingblog.html">Blog</a></li>
        <li><a href="crochet.html">Crochet</a></li>
        <li><a href="origami.html">Origami</a></li>
        <li><a href="#">Jewelry</a></li>
      </ul>
    </nav>
  </header>
  <h1>Upcoming Arts & Events in Jax</h1>
  <!--arts events-->
  <section>
    <h2>Hands-On Art Classes</h2>
    <table class = "event-table">
      <tbody id = "hands-on-events"></tbody>
    </table>
  </section>

  <!--kid events -->
  <section>
    <h2>Events for Kids</h2>
    <table class = "event-table">
      <tbody id = "kids-events"></tbody>
    </table>
  </section>

  <!--mindfulness/mental health events -->
  <section>
    <h2>Mindfulness & Wellness</h2>
    <table class = "event-table">
      <tbody id = "mindfulness-events"></tbody>
    </table>
  </section>

  <!--festivals-->
  <section>
    <h2>Festivals & Markets</h2>
    <table class = "event-table">
      <tbody id = "festival-events"></tbody>
    </table>
  </section>

  <!--display details when clicked-->
  <div id = "event-details" class = "event-details hidden">
    <button id = "close-details">X</button>
    <h2 id = "event-name"></h2>
    <p id = "event-description"></p>
    <p><strong>Date:</strong> <span id = "event-date"></span></p>
    <p><strong>Time:</strong> <span id = "event-time"></span></p>
    <p><strong>Cost:</strong> <span id = "event-cost"></span></p>
    <p><strong>Location:</strong> <span id = "event-location"></span></p>
    <a id = "event-directions" href = "#" target = "_blank">Get Directions</a>
  </div>

  <footer>
    <p>&copy; 2025 Craft Collective. All rights reserved.</p>
  </footer>

  <script src = "js/events.js"></script>
</body>
</body>
</html>
