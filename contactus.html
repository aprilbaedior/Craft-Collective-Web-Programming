<!DOCTYPE html>
<html lang = "en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel = "stylesheet" href = "css/styles.css">
    <style>
        /* CSS for the contact form temporarily embedded */
        body 
        {
            margin: 30px;
            background-color: #f6ebff;
        }
        header, footer 
        {
            text-align: center;
            margin-bottom: 20px;
        }
        header h1 
        {
            font-size: 36px;
            color: #333;
            text-decoration: wavy underline;
        }
        form 
        {
            border: 2px solid #ccc;
            padding: 20px;
            background-color: #fff;
            max-width: 600px;
            margin: 0 auto;
        }
        fieldset 
        {
            border: 2px solid #aaa;
            border-radius: 10px;
            padding: 50px;
            box-sizing: border-box;
        }
        legend 
        {
            font-size: 24px;
            color: #333;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        label 
        {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input[type="text"],input[type="email"],textarea,select,input[type="date"] 
        {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #aaa;
            border-radius: 4px;
            box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            transition: border-color 0.2s ease;
        }
        textarea 
        {
            resize: none;
            height: 100px;
        }
        #char 
        {
            font-size: 0.85rem;
            color: #666;
            text-align: right;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        input[type = "date"], select
        {
            cursor: pointer;
        }
        .checkbox 
        {
            margin-top: 15px;
            text-align: center;
        }
        .checkbox input[type="checkbox"] 
        {
            margin-left: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        } 
        .checkbox label 
        {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .checkbox label:hover 
        {
            color: #0077cc;
        }
        .smileyratinglabel 
        {
            font-size: 18px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            display: block;
        }
        .smileyratinglabel:hover 
        {
            transform: scale(1.1);
        }
        .smileyrating 
        {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .smileyrating input[type="radio"] 
        {
            display: none;
        }
        .smileyrating label 
        {
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .smileyrating label:hover 
        {
            transform: scale(1.2);
        }
        .smileyrating input[type="radio"]:checked + label
        {
            transform: scale(1.4);
        }
        .buttons 
        {
            margin-top: 20px;
            text-align: center;
            justify-content: center;
        }
        .buttons input
        {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: white;
            box-shadow: 0 4px 6px rgba(119, 115, 115, 0.3);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .buttons input:hover 
        {
            background-color: #555;
            box-shadow: 0 6px 8px rgba(119, 115, 115, 0.4);
        }
        footer p 
        {
            font-size: 14px;
            color: rgba(119, 115, 115, 0.4);
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h1>We'd Love To Hear From You!</h1>
    </header>

    <main>
        <form id = "contactForm" method = "get" action = "https:www.w3schools.com/action_page.php" onsubmit = "return validateForm()">
            <fieldset>
                <legend>Contact Us</legend>

                <label for = "name">Name:</label>
                <input type = "text" id = "name" name = "name" required minlength = "3">
                <br>

                <label for = "email">Email (optional):</label>
                <input type = "email" id = "email" name = "email">
                <br>

                <label for = "category">What's this about?</label>
                <select id = "category" name = "category">
                    <option value = "" disabled selected>Select an option</option>
                    <option value = "praise">Praise</option>
                    <option value = "suggestion">Suggestion</option>
                    <option value = "issue">Website Issue</option>
                    <option value = "question">General Question</option>
                </select>
                
                <label for = "rating" class = "smileyratinglabel">Rate Your Experience!</label>
                <div class = "smileyrating">
                    <input type = "radio" name = "rating" id = "rate1" value = "1">
                    <label for = "rate1" title = "Terrible">😠</label>
                    
                    <input type = "radio" name = "rating" id="rate2" value = "2">
                    <label for = "rate2" title = "Ehhh">😕</label>

                    <input type = "radio" name = "rating" id="rate3" value = "3">
                    <label for = "rate3" title = "Okay">😐</label>

                    <input type = "radio" name = "rating" id="rate4" value = "4">
                    <label for = "rate4" title = "Good">🙂</label>

                    <input type = "radio" name = "rating" id = "rate5" value = "5">
                    <label for = "rate5" title = "Awesomeee">🤩</label>
                </div>

                <div class="feedback">
                    <label for = "message">Your Feedback:</label>
                    <textarea id = "message" name = "message" placeholder = "What's on your mind..." oninput="updateCharCount()"></textarea>
                    <p id="char"></p>
                </div>
                
                <label for = "date">When did you visit us?</label>
                <input type = "date" id = "date" name = "date" required>
                <br>

                <div class = "checkbox">
                    <label for = "subscribe">Subscribe to our newsletter?</label>
                    <input type = "checkbox" id = "subscribe" name = "subscribe">
                </div>

                <div class = buttons>
                    <input type = "submit" value = "Submit" />
                    <input type = "reset" value = "Clear Form" />
                </div>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Craft Collective. All rights reserved.</p>
    </footer>

    <!--js to validate form and update character count placed after everything else so it loads last-->
    <script src="js/contact.js"></script>
</body>
</html>
